<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="container">
        <h1 id="pregunta">Cargando encuesta...</h1>
        <div id="opciones"></div>
        
        <p>Usuarios conectados: <span id="conteo-usuarios">0</span></p>
        
        <div class="reacciones">
            <button onclick="enviarReaccion('👍')">👍</button>
            <button onclick="enviarReaccion('❤️')">❤️</button>
            <button onclick="enviarReaccion('😂')">😂</button>
        </div>
    </div>
    

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const pregunta = document.getElementById('pregunta');
        const opciones = document.getElementById('opciones');
        const usuariosConectados = document.getElementById('conteo-usuarios');

        function renderizarEncuesta(data) {
            pregunta.textContent = data.pregunta;
            opciones.innerHTML = '';

            for (let opcion in data.opciones) {
                const btn = document.createElement('button');
                btn.textContent = `${opcion} (${data.opciones[opcion]})`;
                btn.onclick = () => votar(opcion);
                opciones.appendChild(btn);
                opciones.appendChild(document.createElement('br'));
            }
        }

        // Estado inicial al conectarse
        socket.on('encuesta:estado', (data) => {
            renderizarEncuesta(data);
        });
        // Resultados actualizados (cuando alguien vota)
        socket.on('encuesta:resultado', (data) => {
            renderizarEncuesta(data);
        });
        // Conteo de usuarios conectados
        socket.on('usuarios:conteo', (cantidad) => {
            usuariosConectados.textContent = cantidad;
        });

        // Cuando el usuario hace clic para votar
        function votar(nombre) {
            socket.emit('encuesta:votar', nombre);
        }
        // Cuando el usuario envia un emoji
        function enviarReaccion(emoji) {
            socket.emit('reaccion:enviar', emoji);
        }

        socket.on('reaccion:mostrar', (emoji) => {
            const span = document.createElement('span');
            span.textContent = emoji;
            span.classList.add('emoji');

            span.style.left = Math.random() * 90 + '%'; // Posición horizontal aleatoria

            document.body.appendChild(span);

            setTimeout(() => {
                span.remove();
            }, 3000); // Eliminar el emoji después de 3 segundos
        });
    </script>
</body>
<style>
    
    :root {
        --primary-color: #4a90e2;
        --bg-color: #f4f7f6;
        --text-color: #333;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow-x: hidden;
    }

    /* Contenedor Principal */
    .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
        width: 90%;
        max-width: 400px;
    }

    h1 {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        color: #2c3e50;
    }

    /* Botones de Opciones */
    #opciones button {
        background-color: white;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
        padding: 10px 20px;
        margin: 5px 0;
        width: 100%;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #opciones button:hover {
        background-color: var(--primary-color);
        color: white;
        transform: translateY(-2px);
    }

    /* Sección de Reacciones */
    .reacciones {
        margin-top: 20px;
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    .reacciones button {
        background: #eee;
        border: none;
        padding: 10px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .reacciones button:hover {
        transform: scale(1.2);
    }

    /* Usuarios Conectados */
    p {
        font-size: 0.9rem;
        color: #7f8c8d;
    }

    #conteo-usuarios {
        font-weight: bold;
        color: var(--primary-color);
    }

    /* Animación de Emojis */
    .emoji {
        position: fixed;
        bottom: -50px;
        font-size: 2.5rem;
        pointer-events: none;
        z-index: 1000;
        animation: subirYDesaparecer 3s ease-out forwards;
    }

    @keyframes subirYDesaparecer {
        0% {
            transform: translateY(0) rotate(0deg);
            opacity: 1;
        }
        100% {
            transform: translateY(-100vh) rotate(20deg);
            opacity: 0;
        }
    }

</style>

</html>
